<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>re.gift</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            text-align: center;
            max-width: 480px;
        }
        .logo {
            font-size: 2.4rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }
        .message {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #555;
            margin-bottom: 28px;
        }
        .contact {
            font-size: 0.95rem;
            color: #888;
        }
        .contact a {
            color: #555;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
        }
        .contact a:hover {
            color: #111;
            border-color: #111;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">re.gift</div>
        <p class="message">
            re.gift has shut down. Thank you to everyone who used and supported us.
            We're grateful for the journey, but we've decided to close this chapter.
        </p>
        <p class="contact">
            Questions? Reach out at <a href="mailto:yuan@tryregift.com">yuan@tryregift.com</a>
        </p>
    </div>
</body>
</html>
